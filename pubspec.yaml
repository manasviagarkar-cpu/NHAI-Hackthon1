name: nhai_facerec
description: Offline-first on-device facial recognition & liveness detection app for NHAI.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & Core
  cupertino_icons: ^1.0.6

  # Hardware & Camera
  camera: ^0.10.5+9

  # Local ML & Image Preprocessing
  google_mlkit_face_detection: ^0.7.0
  tflite_flutter: ^0.10.4
  image: ^4.1.3

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # Local Settings & Metrics
  shared_preferences: ^2.2.2

  # Typography
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
